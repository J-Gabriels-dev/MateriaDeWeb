<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Site do Gabriel</title>
</head>

<body>

    <h1>Site do Gabriel</h1>

    <!-- Imagem -->
    
    <img src="img/login.jpg" alt="Logo do site" width="50">

    <hr>

    <h2>Login</h2>

    <!-- Formulário -->
    <form action="/enviar-dados" method="GET">

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
        <br><br>

        <label for="password">Senha:</label><br>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
        <br><br>

        <button type="submit">Entrar</button>

    </form>

    <hr>

    <h2>Links úteis</h2>

    <!-- Links -->
    <a href="https://chatgpt.com/" target="_blank">Ajuda</a><br>


    <hr>

    <h2>Usuários cadastrados (exemplo)</h2>

    <!-- Tabela -->
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>Gabriel</td>
            <td>gabriel@email.com</td>
        </tr>
        <tr>
            <td>João</td>
            <td>joao@email.com</td>
        </tr>
    </table>

</body>
</html>
