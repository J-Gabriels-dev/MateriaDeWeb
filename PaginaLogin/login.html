<!DOCTYPE html>

<body>

    <header>
        <div class = "cabecalho">

    <div class="container">
        <h1 class="titulo-login">Login</h1>
        
        <img class="img-login" src="img/login.jpg" alt="Logo do site" width="50">
        


        <!-- Formulário -->
        <form action="/enviar-dados" method="GET">

            <label class="email" for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            <br><br>

            <label class="password" for="password">Senha:</label><br>
            <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            <br><br>

            <button class="enviar" ="submit">Entrar</button>

        </form>
    </div>
    <hr>

    <h2>Links úteis</h2>

    <!-- Links -->
    <a href="https://chatgpt.com/" target="_blank">Ajuda</a><br>
