<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site do Gabriel</title>
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <h1>Site do Gabriel</h1>
       
    </header>

    <hr>

    <!-- Conteúdo principal -->
    <main>

        <!-- Login -->
        <section>
            <h2>Login</h2>

            <form action="/enviar-dados" method="GET">

                <label for="email">Email:</label><br>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Digite seu email" 
                    required
                ><br><br>

                <label for="password">Senha:</label><br>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Digite sua senha" 
                    required
                ><br><br>

                <button type="submit">Entrar</button>

            </form>
        </section>

        <hr>

        <!-- Links -->
        <section>
            <h2>Links úteis</h2>

            <p>
                <a href="https://chatgpt.com/" target="_blank">Ajuda</a>
            </p>

            <p>
                <a href="#">Criar conta</a>
            </p>
        </section>

        <hr>

        <!-- Tabela -->
        <section>
            <h2>Usuários cadastrados (exemplo)</h2>

            <table border="1">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Gabriel</td>
                        <td>gabriel@email.com</td>
                    </tr>
                    <tr>
                        <td>João</td>
                        <td>joao@email.com</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</body>
</html>
